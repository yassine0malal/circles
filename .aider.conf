# Aider AI Guardrails Configuration

[model]
chat-mode = true

[edit]
auto-commit = false
auto-lint = false
auto-test = false

[permissions]
read-only-first = true
require-confirmation = true

[git]
commit = disabled
push = disabled
add = disabled
reset = disabled
rebase = disabled
merge = disabled

[behavior]
plan-before-edit = true
explain-changes = true
show-diff-before-apply = true
stop-after-plan = true

[danger-zone]
allow-shell-commands = false
allow-destructive-ops = false

[workflow]
steps = analyze -> plan -> approve -> implement -> review -> stop

[safety]
block_env_files = true
block_secrets = true
block_prod_changes = true